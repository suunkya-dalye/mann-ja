<!DOCTYPE html>
<html>
<head>
<title>For Someone Special ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#050520,#000);
font-family:Segoe UI;
color:white;
text-align:center;
}

/* Stars */

.stars{
position:absolute;
width:100%;
height:100%;
background:url("https://i.imgur.com/YKY28eT.png");
animation:move 200s linear infinite;
}

@keyframes move{
from{background-position:0 0;}
to{background-position:-10000px 5000px;}
}

/* Moon */

.moon{
position:absolute;
top:60px;
right:80px;
width:120px;
height:120px;
background:white;
border-radius:50%;
box-shadow:0 0 60px white;
}

/* Floating hearts */

.heart{
position:absolute;
color:#ff4da6;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* Main box */

.box{
position:relative;
z-index:2;
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,0.2);
}

h1{
font-size:40px;
color:#ff4da6;
text-shadow:0 0 20px #ff4da6;
}

#text{
font-size:20px;
margin-top:20px;
min-height:60px;
}

/* Buttons */

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:10px;
}

.play{
background:#ff4da6;
color:white;
box-shadow:0 0 15px #ff4da6;
}

.forgive{
background:white;
color:black;
}

button:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="box">

<h1>For You ❤️</h1>

<div id="text"></div>

<button class="play" onclick="playSong()">Play Our Song 🎵</button>
<br>
<button class="forgive" onclick="forgive()">Will You Forgive Me? 💖</button>

</div>

<audio id="music">
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

/* Typing effect */

const message = "I know I made a mistake... but you mean the world to me. Every moment with you is special. I made this little website just to make you smile. ❤️";

let i = 0;

function typing(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typing,50);
}
}

typing();

/* Song */

function playSong(){
document.getElementById("music").play();
}

/* Forgive button */

function forgive(){
alert("Thank you for giving me another chance ❤️");
}

/* Floating hearts */

function createHeart(){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=Math.random()*20+15+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
